# Add to your .gitlab-ci.yml
generate-sbom:
  stage: release
  image: python:3.9
  script:
    - pip install yocto-sbom
    - git submodule status > /dev/null 2>&1 || true
    - yocto-sbom
        --config yocto-sbom.conf
        --version ${CI_COMMIT_TAG:-dev-${CI_COMMIT_SHORT_SHA}}
        --build-config ${BUILD_CONFIG:-default}
        --validate
  artifacts:
    paths:
      - sbom-spdx.json
      - sbom-cdx.json
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
    # Optional: also run on specific branches for testing
    # - if: $CI_COMMIT_BRANCH == "main"
