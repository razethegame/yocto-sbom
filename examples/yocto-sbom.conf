# yocto-sbom configuration file
# All values can be overridden by CLI arguments.

[project]
# Product name used in SBOM document names and root package
product_name = My-Firmware

# Default version (typically overridden by --version on CLI)
# version = 1.0.0

[vendor]
# Organization name (used in supplier fields)
name = My Company

# Short vendor identifier (used in CPE, PURL namespaces)
id = mycompany

# SPDX supplier string (auto-derived from name if not set)
supplier = Organization: My Company

# Base URI for SPDX document namespace
namespace_uri = https://mycompany.com/spdx

[paths]
# Directory containing .bb recipe files (relative to working directory)
recipes_dir = recipes-myproject

# Path to .gitmodules file (optional, for submodule tracking)
gitmodules = .gitmodules

# Path to bblayers.conf (optional, for layer tracking)
bblayers = build/conf/bblayers.conf

# Yocto directory to scan for third-party package metadata (optional)
yocto_dir = yocto

[output]
# Output file paths
spdx = sbom-spdx.json
cdx = sbom-cdx.json
