name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        exclude:
          # macOS and Windows: only test a subset to save CI minutes
          - os: macos-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.8"
          - os: windows-latest
            python-version: "3.9"
          - os: windows-latest
            python-version: "3.11"
        include:
          # Test Python 3.7 on Ubuntu 20.04 (EOL, but supported for legacy Yocto servers)
          - os: ubuntu-20.04
            python-version: "3.7"
          # Test Python 3.6 on Ubuntu 20.04 (EOL, but supported for legacy Yocto servers)
          - os: ubuntu-20.04
            python-version: "3.6"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Verify CLI
        run: yocto-sbom --help
